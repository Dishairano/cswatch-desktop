name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc

    env:
      # Use all cores for cargo — Windows runner has 4 vCPU, this keeps them busy.
      CARGO_BUILD_JOBS: "4"
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "10"
      RUSTFLAGS: "-Csplit-debuginfo=packed -Cdebuginfo=0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          # Include Cargo.lock in key so real dep changes invalidate the cache,
          # but small code changes still hit the warm target/ directory.
          shared-key: "tauri-release-${{ matrix.target }}"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles nsis updater

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cswatch-desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: ver
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        # upload-artifact@v4 strips common parent dirs, so the download lands
        # at artifacts/<artifact-name>/nsis/*.exe etc. Move everything into a
        # flat `flat/` dir and rename spaces -> underscores so gh upload globs
        # stay sane.
        run: |
          set -e
          mkdir -p flat
          shopt -s globstar nullglob
          for f in artifacts/**/nsis/*; do
            base=$(basename "$f")
            safe=$(echo "$base" | tr ' ' '_')
            cp "$f" "flat/$safe"
          done
          ls -la flat/

      - name: Create latest.json manifest
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${TAG#v}"
          NOTES="Release $TAG"
          NSIS_EXE=$(ls flat/*setup*.exe 2>/dev/null | head -1 || true)
          NSIS_SIG=$(ls flat/*setup*.exe.sig 2>/dev/null | head -1 || true)
          if [ -z "$NSIS_EXE" ] || [ -z "$NSIS_SIG" ]; then
            echo "No signed NSIS installer found; skipping latest.json"
            exit 0
          fi
          SIG=$(cat "$NSIS_SIG")
          cat > flat/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "$NOTES",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/Dishairano/cswatch-desktop-releases/releases/download/$TAG/$(basename $NSIS_EXE)"
              }
            }
          }
          EOF
          cat flat/latest.json

      - name: Upload to releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          gh release view "$TAG" --repo Dishairano/cswatch-desktop-releases >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo Dishairano/cswatch-desktop-releases \
              --title "$TAG" \
              --notes "Release $TAG" \
              --draft=false
          gh release upload "$TAG" \
            --repo Dishairano/cswatch-desktop-releases \
            --clobber \
            flat/*
